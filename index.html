<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K1 English Alphabet Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #87CEEB; /* Sky blue background */
            touch-action: manipulation; /* Prevent double-tap zoom on mobile */
        }
        
        h1, h2, .game-font {
            font-family: 'Fredoka One', cursive;
        }

        /* Animations */
        @keyframes bounce-scale {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .animate-bounce-scale {
            animation: bounce-scale 2s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake-err {
            animation: shake 0.4s;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-in {
            animation: popIn 0.5s ease-out forwards;
        }

        .btn-press {
            transition: transform 0.1s;
        }
        .btn-press:active {
            transform: scale(0.95);
        }

        /* Hide elements */
        .hidden-view {
            display: none !important;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 overflow-hidden select-none">

    <!-- App Container -->
    <div id="app-container" class="relative w-full max-w-md md:max-w-lg bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl border-4 border-white overflow-hidden h-[85vh] flex flex-col">
        
        <!-- Header -->
        <div id="header" class="bg-blue-500 text-white p-4 flex justify-between items-center shrink-0 shadow-md z-10 hidden-view">
            <button onclick="goHome()" class="btn-press bg-white/20 hover:bg-white/30 rounded-full w-12 h-12 flex items-center justify-center text-2xl shadow-inner">
                🏠
            </button>
            <h2 id="header-title" class="text-2xl game-font tracking-wide">Game</h2>
            <div id="stage-indicator" class="text-lg font-bold game-font bg-white/20 px-3 py-1 rounded-full shadow-inner flex items-center justify-center min-w-[4rem]">Stage 1</div>
        </div>

        <!-- Main Menu View -->
        <div id="view-menu" class="flex-1 flex flex-col items-center justify-center p-6 space-y-6 overflow-y-auto">
            <h1 class="text-4xl text-blue-600 game-font text-center mb-4 drop-shadow-md">ABC Games</h1>
            
            <!-- Game 1 Button -->
            <button onclick="selectGame(1)" class="btn-press w-full bg-gradient-to-r from-yellow-400 to-orange-400 rounded-2xl p-4 shadow-[0_8px_0_#b45309] border-2 border-orange-200 flex items-center space-x-4">
                <div class="bg-white rounded-xl w-16 h-16 flex items-center justify-center text-4xl shadow-inner">🔍</div>
                <div class="text-left flex-1">
                    <div class="text-white text-2xl font-bold game-font drop-shadow-sm">Find Letter</div>
                    <div class="text-orange-100 text-sm font-bold">Tap the matching letter</div>
                </div>
            </button>

            <!-- Game 2 Button -->
            <button onclick="selectGame(2)" class="btn-press w-full bg-gradient-to-r from-green-400 to-emerald-500 rounded-2xl p-4 shadow-[0_8px_0_#065f46] border-2 border-emerald-200 flex items-center space-x-4">
                <div class="bg-white rounded-xl w-16 h-16 flex items-center justify-center text-4xl shadow-inner">A🍎</div>
                <div class="text-left flex-1">
                    <div class="text-white text-2xl font-bold game-font drop-shadow-sm">Letter Match</div>
                    <div class="text-green-100 text-sm font-bold">Match letter to picture</div>
                </div>
            </button>

            <!-- Game 3 Button -->
            <button onclick="selectGame(3)" class="btn-press w-full bg-gradient-to-r from-purple-400 to-indigo-500 rounded-2xl p-4 shadow-[0_8px_0_#3730a3] border-2 border-indigo-200 flex items-center space-x-4">
                <div class="bg-white rounded-xl w-16 h-16 flex items-center justify-center text-4xl shadow-inner">🍎💬</div>
                <div class="text-left flex-1">
                    <div class="text-white text-2xl font-bold game-font drop-shadow-sm">Word Match</div>
                    <div class="text-indigo-100 text-sm font-bold">Match picture to word</div>
                </div>
            </button>
        </div>

        <!-- Group Selection View -->
        <div id="view-groups" class="hidden-view flex-1 flex flex-col items-center justify-center p-6 space-y-4">
            <h2 class="text-3xl text-gray-700 game-font text-center mb-2">Choose Letters</h2>
            <div id="group-buttons-container" class="w-full flex flex-col space-y-3">
                <!-- Group buttons injected here -->
            </div>
        </div>

        <!-- Game Play View -->
        <div id="view-game" class="hidden-view flex-1 flex flex-col items-center justify-center p-4 relative transition-all duration-300">
            
            <!-- Monkey Tree Progress (Only Game 3) -->
            <div id="monkey-tree" class="hidden-view absolute left-6 md:left-8 top-28 bottom-12 w-5 bg-[#8B4513] border-x-[3px] border-[#5C4033] rounded-t-full shadow-[2px_0_5px_rgba(0,0,0,0.2)]">
                <!-- Tree Top -->
                <div class="absolute -top-16 -left-[3.25rem] text-[5.5rem] drop-shadow-xl z-10 pointer-events-none">🌳</div>
                <!-- Fruit -->
                <div id="tree-fruit" class="absolute -top-6 -left-3 text-4xl z-20 animate-bounce pointer-events-none">🍌</div>
                <!-- Monkey -->
                <div id="monkey-player" class="absolute left-[-1.35rem] text-5xl transition-all duration-700 ease-in-out z-30 pointer-events-none drop-shadow-md" style="bottom: 0%;">🐒</div>
            </div>

            <!-- Question Area -->
            <div id="question-area" class="w-full text-center mb-6 h-32 flex items-center justify-center z-20">
                <!-- Content injected here based on game -->
            </div>
            
            <!-- Options Area -->
            <div id="options-area" class="w-full flex flex-wrap justify-center gap-4 pb-4 overflow-y-auto z-20">
                <!-- Options injected here -->
            </div>
        </div>

        <!-- Success Overlay -->
        <div id="success-overlay" class="hidden-view absolute inset-0 bg-white/80 z-50 flex flex-col items-center justify-center backdrop-blur-sm">
            <div id="overlay-emoji" class="text-9xl pop-in mb-4">🌟</div>
            <h2 id="success-message" class="text-4xl text-green-500 game-font animate-bounce-scale text-center px-4 drop-shadow-md"></h2>
        </div>

    </div>

    <script>
        // --- DATA DICTIONARY (8 words per letter for massive variety) ---
        const alphabetData = {

            'I': [{word: 'Ice cream', emoji: '🍦'}, {word: 'Igloo', emoji: '🧊'}, {word: 'Island', emoji: '🏝️'}, {word: 'Ice', emoji: '🧊'}, {word: 'Insect', emoji: '🐛'}, {word: 'Iron', emoji: '🧲'}, {word: 'Iguana', emoji: '🦎'}, {word: 'Idea', emoji: '💡'}],

            'N': [{word: 'Nut', emoji: '🥜'}, {word: 'Nest', emoji: '🪹'}, {word: 'Nose', emoji: '👃'}, {word: 'Nine', emoji: '9️⃣'}, {word: 'Ninja', emoji: '🥷'}, {word: 'Nurse', emoji: '👩‍⚕️'}, {word: 'Notebook', emoji: '📓'}, {word: 'Nail', emoji: '💅'}],
            'O': [{word: 'Owl', emoji: '🦉'}, {word: 'Octopus', emoji: '🐙'}, {word: 'Orange', emoji: '🍊'}, {word: 'Ocean', emoji: '🌊'}, {word: 'Ostrich', emoji: '🦤'}, {word: 'Onion', emoji: '🧅'}, {word: 'Ox', emoji: '🐂'}, {word: 'Oven', emoji: '🍳'}],
            'P': [{word: 'Pig', emoji: '🐷'}, {word: 'Penguin', emoji: '🐧'}, {word: 'Pizza', emoji: '🍕'}, {word: 'Pencil', emoji: '✏️'}, {word: 'Panda', emoji: '🐼'}, {word: 'Parrot', emoji: '🦜'}, {word: 'Pumpkin', emoji: '🎃'}, {word: 'Plane', emoji: '✈️'}],

            'S': [{word: 'Sun', emoji: '☀️'}, {word: 'Star', emoji: '⭐'}, {word: 'Snake', emoji: '🐍'}, {word: 'Spider', emoji: '🕷️'}, {word: 'Shoe', emoji: '👟'}, {word: 'Snowman', emoji: '⛄'}, {word: 'Sheep', emoji: '🐑'}, {word: 'Strawberry', emoji: '🍓'}],
            'T': [{word: 'Tree', emoji: '🌳'}, {word: 'Tiger', emoji: '🐅'}, {word: 'Train', emoji: '🚂'}, {word: 'Turtle', emoji: '🐢'}, {word: 'Tomato', emoji: '🍅'}, {word: 'Tent', emoji: '⛺'}, {word: 'Tooth', emoji: '🦷'}, {word: 'Telephone', emoji: '☎️'}],
            'U': [{word: 'Umbrella', emoji: '☂️'}, {word: 'Unicorn', emoji: '🦄'}, {word: 'Up', emoji: '⬆️'}, {word: 'UFO', emoji: '🛸'}, {word: 'Uniform', emoji: '🥋'}, {word: 'Urn', emoji: '🏺'}, {word: 'Unicycle', emoji: '🚳'}, {word: 'Umpire', emoji: '🧑‍⚖️'}],
            'V': [{word: 'Van', emoji: '🚐'}, {word: 'Violin', emoji: '🎻'}, {word: 'Volcano', emoji: '🌋'}, {word: 'Vampire', emoji: '🧛'}, {word: 'Vest', emoji: '🦺'}, {word: 'Vegetable', emoji: '🥦'}, {word: 'Vase', emoji: '🏺'}, {word: 'Video', emoji: '📹'}],
            'W': [{word: 'Watermelon', emoji: '🍉'}, {word: 'Whale', emoji: '🐳'}, {word: 'Window', emoji: '🪟'}, {word: 'Wheel', emoji: '🛞'}, {word: 'Watch', emoji: '⌚'}, {word: 'Worm', emoji: '🪱'}, {word: 'Wolf', emoji: '🐺'}, {word: 'Wand', emoji: '🪄'}],
            'X': [{word: 'Xylophone', emoji: '🎹'}, {word: 'X-ray', emoji: '🦴'}, {word: 'Xmas', emoji: '🎄'}, {word: 'Xenops', emoji: '🐦'}, {word: 'Xbox', emoji: '🎮'}, {word: 'X-ray fish', emoji: '🐟'}, {word: 'Xylem', emoji: '🪵'}, {word: 'Xerus', emoji: '🐿️'}],
            'Y': [{word: 'Yoyo', emoji: '🪀'}, {word: 'Yacht', emoji: '🛥️'}, {word: 'Yarn', emoji: '🧶'}, {word: 'Yogurt', emoji: '🥣'}, {word: 'Yak', emoji: '🐃'}, {word: 'Yellow', emoji: '🟨'}, {word: 'Yawn', emoji: '🥱'}, {word: 'Yoga', emoji: '🧘'}],
            'Z': [{word: 'Zebra', emoji: '🦓'}, {word: 'Zoo', emoji: '🦁'}, {word: 'Zero', emoji: '0️⃣'}, {word: 'Zipper', emoji: '🤐'}, {word: 'Zombie', emoji: '🧟'}, {word: 'Zigzag', emoji: '〰️'}, {word: 'Zeppelin', emoji: '🛩️'}, {word: 'Zucchini', emoji: '🥒'}]
        };

        const letterGroups = [
            { label: 'A - E', letters: ['A','B','C','D','E'] },
            { label: 'F - J', letters: ['F','G','H','I','J'] },
            { label: 'K - O', letters: ['K','L','M','N','O'] },
            { label: 'P - T', letters: ['P','Q','R','S','T'] },
            { label: 'U - Z', letters: ['U','V','W','X','Y','Z'] }
        ];

        const encouragements = ["Great!", "You are right!", "Good job!", "Awesome!", "Excellent!"];

        // --- APP STATE ---
        let currentGameId = 0;
        let currentGroupIndex = 0;
        let currentLetterList = [];
        let targetLetter = '';
        let isInputLocked = false;
        let successCount = 0;
        let currentStage = 1;
        let game1TargetsFound = 0;

        // --- AUDIO ENGINE ---
        let preferredVoice = null;
        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            preferredVoice = voices.find(v => v.name === 'Google US English') ||
                             voices.find(v => v.name === 'Google UK English Female') ||
                             voices.find(v => v.name === 'Samantha') ||
                             voices.find(v => v.name === 'Alex') ||
                             voices.find(v => v.lang === 'en-US' && v.localService) ||
                             voices.find(v => v.lang.startsWith('en'));
        }
        window.speechSynthesis.onvoiceschanged = loadVoices;

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            if (preferredVoice) utterance.voice = preferredVoice;
            utterance.rate = 0.85; 
            utterance.pitch = 1.0; 
            window.speechSynthesis.speak(utterance);
        }

        function playSuccessSound() {
            const word = encouragements[Math.floor(Math.random() * encouragements.length)];
            speak(word);
            return word;
        }

        function playErrorSound() {
            speak("Try again.");
        }

        // --- NAVIGATION LOGIC ---
        function showView(viewId) {
            document.getElementById('view-menu').classList.add('hidden-view');
            document.getElementById('view-groups').classList.add('hidden-view');
            document.getElementById('view-game').classList.add('hidden-view');
            
            const header = document.getElementById('header');
            if(viewId === 'view-menu') {
                header.classList.add('hidden-view');
            } else {
                header.classList.remove('hidden-view');
            }

            document.getElementById(viewId).classList.remove('hidden-view');
        }

        function goHome() {
            window.speechSynthesis.cancel();
            showView('view-menu');
        }

        function selectGame(gameId) {
            currentGameId = gameId;
            const titles = ["", "Find Letter", "Letter Match", "Word Match"];
            document.getElementById('header-title').innerText = titles[gameId];
            
            renderGroupSelection();
            showView('view-groups');
            speak("Choose a group.");
        }

        function renderGroupSelection() {
            const container = document.getElementById('group-buttons-container');
            container.innerHTML = '';
            
            const colors = [
                'from-pink-400 to-rose-500 shadow-[0_6px_0_#be123c]',
                'from-cyan-400 to-blue-500 shadow-[0_6px_0_#1d4ed8]',
                'from-lime-400 to-green-500 shadow-[0_6px_0_#15803d]',
                'from-amber-400 to-orange-500 shadow-[0_6px_0_#c2410c]',
                'from-violet-400 to-purple-500 shadow-[0_6px_0_#6d28d9]'
            ];

            letterGroups.forEach((group, index) => {
                const btn = document.createElement('button');
                btn.className = `btn-press w-full bg-gradient-to-r ${colors[index % colors.length]} text-white rounded-2xl p-5 text-3xl font-bold game-font border-2 border-white/50`;
                btn.innerText = group.label;
                btn.onclick = () => startLevel(index);
                container.appendChild(btn);
            });
        }

        function startLevel(groupIndex) {
            currentGroupIndex = groupIndex;
            currentLetterList = [...letterGroups[groupIndex].letters];
            successCount = 0;
            currentStage = 1;
            document.getElementById('stage-indicator').innerText = `Stage ${currentStage}`;
            
            // 如果是 Word Match (Game 3)，啟動猴子爬樹的版面與初始設定
            if (currentGameId === 3) {
                document.getElementById('monkey-tree').classList.remove('hidden-view');
                document.getElementById('view-game').classList.add('pl-20', 'md:pl-24');
                document.getElementById('monkey-player').style.bottom = '0%';
                document.getElementById('tree-fruit').classList.remove('hidden-view');
                document.getElementById('tree-fruit').innerText = '🍌';
            } else {
                document.getElementById('monkey-tree').classList.add('hidden-view');
                document.getElementById('view-game').classList.remove('pl-20', 'md:pl-24');
            }

            showView('view-game');
            nextQuestion();
        }

        // --- GAME LOGIC ---

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function getMixedCase(letter) {
            return Math.random() > 0.5 ? letter.toUpperCase() : letter.toLowerCase();
        }

        // 隨機抽取字母下的任一單字資料
        function getRandomWordData(letter) {
            const arr = alphabetData[letter];
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function nextQuestion() {
            isInputLocked = false;
            game1TargetsFound = 0; 
            targetLetter = currentLetterList[Math.floor(Math.random() * currentLetterList.length)];
            
            const qArea = document.getElementById('question-area');
            const optArea = document.getElementById('options-area');
            qArea.innerHTML = '';
            optArea.innerHTML = '';

            if (currentGameId === 1) {
                renderGame1(qArea, optArea);
            } else if (currentGameId === 2) {
                renderGame2(qArea, optArea);
            } else if (currentGameId === 3) {
                renderGame3(qArea, optArea);
            }
        }

        // Game 1: Find Letter (Grid of 12 letters, find 4)
        function renderGame1(qArea, optArea) {
            const displayTarget = getMixedCase(targetLetter);
            qArea.innerHTML = `<div class="text-6xl game-font text-blue-600 drop-shadow-lg bg-white w-24 h-24 rounded-3xl flex items-center justify-center border-4 border-blue-200 animate-bounce-scale">${displayTarget}</div>`;
            speak(`Find all letter ${targetLetter}`);

            let options = [];
            for (let i = 0; i < 4; i++) {
                options.push(targetLetter);
            }
            
            let fullPool = Object.keys(alphabetData).filter(l => l !== targetLetter);
            while(options.length < 12) {
                let r = Math.floor(Math.random() * fullPool.length);
                options.push(fullPool[r]);
            }

            options = shuffleArray(options);

            optArea.className = "w-full grid grid-cols-3 gap-3 px-4"; 
            options.forEach(opt => {
                const displayOpt = getMixedCase(opt);
                const btn = document.createElement('button');
                btn.className = "btn-press bg-white border-4 border-gray-200 rounded-2xl h-16 text-4xl game-font text-gray-700 shadow-md flex items-center justify-center";
                btn.innerText = displayOpt;
                btn.onclick = () => handleAnswer(opt === targetLetter, btn);
                optArea.appendChild(btn);
            });
        }

        function playOptionAudio(e, word) {
            e.stopPropagation(); 
            speak(word);
        }

        // Game 2: Letter Match (Match letter to picture)
        function renderGame2(qArea, optArea) {
            const displayTarget = getMixedCase(targetLetter);
            qArea.innerHTML = `<div class="text-7xl lg:text-8xl game-font text-green-600 drop-shadow-lg bg-white w-28 h-28 lg:w-32 lg:h-32 rounded-3xl flex items-center justify-center border-4 border-green-200">${displayTarget}</div>`;
            speak(`${targetLetter} is for...`);

            // 依據 Stage 決定選項數量
            let numOptions = currentStage >= 3 ? 4 : 2;
            let options = [{ letter: targetLetter, data: getRandomWordData(targetLetter) }];
            
            let pool = currentLetterList.filter(l => l !== targetLetter);
            let fullPool = Object.keys(alphabetData).filter(l => l !== targetLetter);

            while (options.length < numOptions) {
                let distLetter = '';
                if(pool.length > 0) {
                    let r = Math.floor(Math.random() * pool.length);
                    distLetter = pool[r];
                    pool.splice(r, 1);
                } else {
                    let r = Math.floor(Math.random() * fullPool.length);
                    distLetter = fullPool[r];
                    fullPool.splice(r, 1);
                }
                options.push({ letter: distLetter, data: getRandomWordData(distLetter) });
            }

            options = shuffleArray(options);
            
            if (numOptions === 4) {
                optArea.className = "w-full grid grid-cols-2 gap-4 px-4 justify-items-center"; 
            } else {
                optArea.className = "w-full flex flex-row justify-center gap-6 px-4"; 
            }
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                const btnSize = numOptions === 4 ? "w-28 h-28 text-6xl" : "w-32 h-32 text-6xl";
                btn.className = `btn-press bg-white border-4 border-gray-200 rounded-3xl ${btnSize} shadow-md flex items-center justify-center relative overflow-hidden`;
                
                btn.innerHTML = `
                    ${opt.data.emoji}
                    <div class="absolute bottom-1 right-1 bg-yellow-400 border-2 border-white rounded-full w-8 h-8 flex items-center justify-center text-sm shadow-lg btn-press" onclick="playOptionAudio(event, '${opt.data.word}')">
                        🔊
                    </div>
                `;
                
                btn.onclick = () => handleAnswer(opt.letter === targetLetter, btn);
                optArea.appendChild(btn);
            });
        }

        // Game 3: Word Match (Match picture to word)
        function renderGame3(qArea, optArea) {
            const correctData = getRandomWordData(targetLetter);
            
            qArea.innerHTML = `
                <div class="relative drop-shadow-lg bg-white w-28 h-28 lg:w-32 lg:h-32 rounded-3xl flex items-center justify-center border-4 border-indigo-200 text-7xl lg:text-8xl">
                    ${correctData.emoji}
                    <button onclick="speak('${correctData.word}')" class="absolute -bottom-4 -right-4 bg-yellow-400 border-2 border-white rounded-full w-10 h-10 lg:w-12 lg:h-12 flex items-center justify-center text-xl lg:text-2xl shadow-lg btn-press">
                        🔊
                    </button>
                </div>
            `;
            speak(`What is this?`);

            let numOptions = currentStage >= 3 ? 4 : 2;
            let options = [{ letter: targetLetter, data: correctData }];
            
            let pool = currentLetterList.filter(l => l !== targetLetter);
            let fullPool = Object.keys(alphabetData).filter(l => l !== targetLetter);

            while (options.length < numOptions) {
                let distLetter = '';
                if(pool.length > 0) {
                    let r = Math.floor(Math.random() * pool.length);
                    distLetter = pool[r];
                    pool.splice(r, 1);
                } else {
                    let r = Math.floor(Math.random() * fullPool.length);
                    distLetter = fullPool[r];
                    fullPool.splice(r, 1);
                }
                options.push({ letter: distLetter, data: getRandomWordData(distLetter) });
            }

            options = shuffleArray(options);
            
            if (numOptions === 4) {
                optArea.className = "w-full grid grid-cols-2 gap-3 px-4 justify-items-center"; 
            } else {
                optArea.className = "w-full flex flex-col items-center gap-4 px-4"; 
            }
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                const btnStyle = numOptions === 4 
                    ? "w-full p-3 text-2xl" 
                    : "w-full max-w-xs p-4 text-4xl";
                    
                btn.className = `btn-press bg-white border-4 border-gray-200 rounded-2xl ${btnStyle} game-font text-gray-700 shadow-md flex items-center justify-center text-center leading-tight`;
                btn.innerText = opt.data.word;
                btn.onclick = () => handleAnswer(opt.letter === targetLetter, btn);
                optArea.appendChild(btn);
            });
        }

        // --- ANSWER HANDLING ---
        function handleAnswer(isCorrect, buttonEl) {
            if (isInputLocked || buttonEl.disabled) return;

            if (isCorrect) {
                buttonEl.classList.add('bg-green-100', 'border-green-400', 'scale-105');
                buttonEl.disabled = true; 

                if (currentGameId === 1) {
                    game1TargetsFound++;
                    if (game1TargetsFound < 4) {
                        speak(encouragements[Math.floor(Math.random() * encouragements.length)]);
                        return; 
                    }
                }

                isInputLocked = true;
                successCount++;
                let isLevelUp = false;

                if (successCount % 5 === 0 && currentStage < 3) {
                    currentStage++;
                    isLevelUp = true;
                    document.getElementById('stage-indicator').innerText = `Stage ${currentStage}`;
                }

                // ==========================================
                // Monkey Climbing Animation Logic (Game 3)
                // ==========================================
                let climbStep = 0;
                if (currentGameId === 3) {
                    climbStep = successCount % 5;
                    // 如果剛好滿 5 次，step 為 0，但實際上是到達樹頂(5步)
                    if (climbStep === 0 && successCount > 0) climbStep = 5; 
                    
                    const monkey = document.getElementById('monkey-player');
                    if (monkey) monkey.style.bottom = (climbStep * 18) + '%'; // 每次爬 18% 高度
                    
                    if (climbStep === 5) {
                        // 隱藏樹上的水果，製造被猴子吃掉的錯覺
                        document.getElementById('tree-fruit').classList.add('hidden-view');
                    }
                }
                // ==========================================

                const encouragementWord = playSuccessSound();
                
                const overlay = document.getElementById('success-overlay');
                const msg = document.getElementById('success-message');
                document.getElementById('overlay-emoji').innerHTML = '🌟'; // Reset default emoji
                
                if (isLevelUp) {
                    if (currentGameId === 3) {
                        // 如果是 Game 3，過關畫面顯示猴子與摘到的專屬水果
                        const fruit = ['🍌', '🍎', '🍇'][currentStage - 2] || '🍌';
                        msg.innerHTML = `${encouragementWord}<br><span class="text-5xl text-yellow-500 drop-shadow-md">STAGE UP! 🚀</span><br><div class="text-8xl mt-4 animate-bounce-scale pop-in">🐒${fruit}</div>`;
                        document.getElementById('overlay-emoji').innerHTML = '';
                    } else {
                        msg.innerHTML = `${encouragementWord}<br><span class="text-5xl text-yellow-500 drop-shadow-md">STAGE UP! 🚀</span>`;
                    }
                    speak("Level Up!");
                } else {
                    // 全破最高境界 (Stage 3 過關)
                    if (currentGameId === 3 && climbStep === 5 && successCount >= 15) {
                        msg.innerHTML = `${encouragementWord}<br><span class="text-5xl text-yellow-500 drop-shadow-md">YOU DID IT! 🎉</span><br><div class="text-8xl mt-4 animate-bounce-scale pop-in">🐒👑</div>`;
                        document.getElementById('overlay-emoji').innerHTML = '';
                    } else {
                        msg.innerText = encouragementWord;
                    }
                }
                
                overlay.classList.remove('hidden-view');

                setTimeout(() => {
                    overlay.classList.add('hidden-view');
                    
                    // ==========================================
                    // 準備進入下一題前，如果是剛升級，將猴子放回樹根，結出新水果
                    if (currentGameId === 3 && climbStep === 5) {
                        document.getElementById('monkey-player').style.bottom = '0%';
                        document.getElementById('tree-fruit').classList.remove('hidden-view');
                        // 依照階段產生不同的水果 (全破後結出皇冠)
                        const nextFruit = successCount >= 15 ? '👑' : ['🍌', '🍎', '🍇'][currentStage - 1];
                        document.getElementById('tree-fruit').innerText = nextFruit || '👑';
                    }
                    // ==========================================

                    nextQuestion();
                }, 2200);

            } else {
                // 如果答錯了
                buttonEl.classList.remove('shake-err');
                void buttonEl.offsetWidth; 
                buttonEl.classList.add('shake-err', 'bg-red-50', 'border-red-300');
                
                // Game 3 猴子抖動提示錯誤
                if (currentGameId === 3) {
                    const monkey = document.getElementById('monkey-player');
                    monkey.classList.remove('shake-err');
                    void monkey.offsetWidth; 
                    monkey.classList.add('shake-err');
                }

                playErrorSound();
                
                setTimeout(() => {
                    buttonEl.classList.remove('bg-red-50', 'border-red-300');
                }, 500);
            }
        }

    </script>
</body>
</html>
